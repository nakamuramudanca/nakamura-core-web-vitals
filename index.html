<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Core Web Vitals - Nakamura Mudanças</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .metric {
      font-size: 22px;
      margin: 10px 0;
    }

    .good { color: #22c55e; }
    .warn { color: #facc15; }
    .bad { color: #ef4444; }

    a {
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 Core Web Vitals - Nakamura Mudanças</h1>

    <div class="card">
      <h2>Status do Site</h2>
      <p>Monitoramento automático via Lighthouse + GitHub</p>
    </div>

    <div class="card">
      <h2>Métricas (Referência)</h2>

      <div class="metric good">✔ LCP: ideal até 2.5s</div>
      <div class="metric good">✔ CLS: ideal até 0.1</div>
      <div class="metric good">✔ INP: ideal até 200ms</div>
    </div>

    <div class="card">
      <h2>Relatórios</h2>
      <p>
        <a href="#">Ver último relatório Lighthouse</a>
      </p>
    </div>

    <div class="card">
      <h2>Ferramentas</h2>
      <p>
        <a href="https://pagespeed.web.dev/" target="_blank">PageSpeed Insights</a><br>
        <a href="https://search.google.com/search-console" target="_blank">Search Console</a>
      </p>
    </div>

  </div>

</body>
</html>
