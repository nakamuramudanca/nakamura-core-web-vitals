name: Lighthouse

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Run Lighthouse
      uses: treosh/lighthouse-ci-action@v10
      with:
        urls: |
          https://nakamuramudancas.com.br
        uploadArtifacts: true
